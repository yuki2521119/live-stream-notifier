<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgDot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141428"/>
      <stop offset="100%" stop-color="#08080f"/>
    </linearGradient>
    <radialGradient id="dotGrad" cx="42%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ff5577"/>
      <stop offset="100%" stop-color="#cc0022"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgDot)"/>
  <!-- Outer pulse ring 3 -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#ff1744" stroke-width="6" opacity="0.1"/>
  <!-- Outer pulse ring 2 -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#ff1744" stroke-width="8" opacity="0.2"/>
  <!-- Outer pulse ring 1 -->
  <circle cx="256" cy="256" r="110" fill="none" stroke="#ff1744" stroke-width="10" opacity="0.35"/>
  <!-- Glow halo -->
  <circle cx="256" cy="256" r="80" fill="#ff1744" opacity="0.15"/>
  <!-- Main dot -->
  <circle cx="256" cy="256" r="72" fill="url(#dotGrad)"/>
  <!-- Highlight -->
  <circle cx="234" cy="232" r="22" fill="white" opacity="0.3"/>
</svg>
